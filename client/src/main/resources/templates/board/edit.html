<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BOARD EDIT</title>
</head>
<body>
    <h3>Board Edit</h3>
    <p><a href="/board/list">Board List</a></p>
    <form action="/board/edit" method="post">
        <input type="hidden" name="boardId" th:value="${response.boardId}" />
        <input type="text" name="title" th:value="${response.title}" />
        <input type="text" name="writer" th:value="${response.writer}" readonly />
        <input type="text" name="content" th:value="${response.content}" />
        <input type="text" name="regDate" th:value="${#strings.replace(response.regDate, 'T', ' ')}" readonly />
        <input type="text" name="modDate" th:value="${#strings.replace(response.modDate, 'T', ' ')}" readonly />
        <button type="submit">EDIT</button>
        <button type="button" id="btn-delete">DELETE</button>
    </form>

    <!-- Javascript -->
    <script th:inline="javascript">
        const boardId = [[${response.boardId}]];
        const btnDelete = document.getElementById('btn-delete');
        btnDelete.addEventListener('click', () => {
            location.href = `/board/delete?board_id=${boardId}`;
        });
    </script>
</body>
</html>
